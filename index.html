<!DOCTYPE html>
<html lang="en" dir="ltr" id="html-root">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CKN&CKN — Staff Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fredoka:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --yolk:#F5D200;--red:#D42B2B;--crisp:#FF6B35;--dark:#1A0A00;
  --brown:#3D1C02;--cream:#FFF8E7;--muted:#8A6A50;
  --green:#2ECC71;--blue:#3498DB;--purple:#9B59B6;--panel:#221000;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{background:var(--dark);color:var(--cream);font-family:'Fredoka',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(61,28,2,.8) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(245,210,0,.04) 0%,transparent 50%);pointer-events:none;z-index:0}

/* TOPBAR */
.topbar{background:var(--brown);border-bottom:3px solid var(--yolk);padding:0 20px;display:flex;align-items:center;justify-content:space-between;min-height:60px;position:sticky;top:0;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,.6);flex-wrap:wrap;gap:6px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:44px;height:44px;border-radius:50%;border:3px solid var(--yolk);object-fit:cover;box-shadow:0 0 12px rgba(245,210,0,.4)}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--yolk);line-height:1}
.brand-sub{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--crisp);text-transform:uppercase}
.top-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.clock-display{font-family:'DM Mono',monospace;font-size:13px;color:var(--yolk);letter-spacing:2px;background:rgba(245,210,0,.08);border:1px solid rgba(245,210,0,.2);padding:4px 10px;border-radius:4px}
.role-pill{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;padding:3px 10px;border-radius:10px;text-transform:uppercase}
.pill-mgr{background:rgba(245,210,0,.15);color:var(--yolk);border:1px solid rgba(245,210,0,.3)}
.pill-wkr{background:rgba(52,152,219,.15);color:var(--blue);border:1px solid rgba(52,152,219,.3)}

/* LANG SWITCHER */
.lang-switcher{display:flex;gap:4px}
.lang-btn{background:transparent;border:1px solid rgba(245,210,0,.2);color:var(--muted);padding:3px 8px;border-radius:4px;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;transition:all .2s}
.lang-btn.active{background:rgba(245,210,0,.12);border-color:var(--yolk);color:var(--yolk)}

/* BODY */
.body{padding:20px;max-width:1400px;margin:0 auto;position:relative;z-index:1}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:rgba(61,28,2,.6);border:1px solid rgba(245,210,0,.2);border-radius:16px;padding:36px;width:100%;max-width:460px;backdrop-filter:blur(10px)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo img{width:80px;height:80px;border-radius:50%;border:4px solid var(--yolk);box-shadow:0 0 32px rgba(245,210,0,.3)}
.auth-title{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:5px;color:var(--yolk);margin-top:10px}
.auth-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--crisp);text-transform:uppercase}

/* FORMS */
.fg{display:flex;flex-direction:column;gap:12px}
.lbl-mono{display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
input,select,textarea{width:100%;padding:10px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(245,210,0,.2);border-radius:4px;color:var(--cream);font-family:'Fredoka',sans-serif;font-size:14px;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:rgba(245,210,0,.5);background:rgba(255,255,255,.07)}
select option{background:var(--dark)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:6px;border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px;font-size:15px;transition:all .2s;text-decoration:none}
.btn-yolk{background:var(--yolk);color:var(--dark)}
.btn-yolk:hover{background:#ffdf00;transform:translateY(-1px);box-shadow:0 4px 16px rgba(245,210,0,.3)}
.btn-dark{background:rgba(255,255,255,.06);color:var(--cream);border:1px solid rgba(255,255,255,.1)}
.btn-dark:hover{background:rgba(255,255,255,.1)}
.btn-green{background:rgba(46,204,113,.2);color:var(--green);border:1px solid rgba(46,204,113,.3)}
.btn-green:hover{background:rgba(46,204,113,.3)}
.btn-red{background:rgba(231,76,60,.15);color:#e74c3c;border:1px solid rgba(231,76,60,.25)}
.btn-red:hover{background:rgba(231,76,60,.25)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:4px;font-family:'DM Mono',monospace;letter-spacing:.5px;border:none;cursor:pointer;transition:all .2s}
.btn-logout{background:rgba(231,76,60,.15);color:#e74c3c;border:1px solid rgba(231,76,60,.2);padding:5px 12px;border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer}

/* NAV TABS */
.nav-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:18px;background:rgba(255,255,255,.02);border:1px solid rgba(245,210,0,.1);border-radius:8px;padding:6px}
.nav-tab{padding:7px 14px;border-radius:5px;border:none;background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.5px;cursor:pointer;transition:all .2s;white-space:nowrap}
.nav-tab:hover{color:var(--cream);background:rgba(255,255,255,.05)}
.nav-tab.active{background:rgba(245,210,0,.12);color:var(--yolk);border:1px solid rgba(245,210,0,.25)}
.badge-num{background:#e74c3c;color:#fff;border-radius:8px;padding:1px 6px;font-size:9px;margin-left:3px;vertical-align:middle}

/* PANELS */
.panel{background:rgba(255,255,255,.03);border:1px solid rgba(245,210,0,.1);border-radius:10px;padding:18px;margin-bottom:14px}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2.5px;color:var(--yolk);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.sg{grid-template-columns:1fr}}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:rgba(255,255,255,.03);border:1px solid rgba(245,210,0,.1);border-radius:8px;padding:14px 16px}
.sc-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.sc-value{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--cream)}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase}
.bg{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.2)}
.by{background:rgba(245,210,0,.1);color:var(--yolk);border:1px solid rgba(245,210,0,.2)}
.br{background:rgba(231,76,60,.1);color:#e74c3c;border:1px solid rgba(231,76,60,.2)}
.bb{background:rgba(52,152,219,.1);color:var(--blue);border:1px solid rgba(52,152,219,.2)}
.bo{background:rgba(255,107,53,.1);color:var(--crisp);border:1px solid rgba(255,107,53,.2)}

/* TABLE */
.table-wrap{background:rgba(255,255,255,.02);border:1px solid rgba(245,210,0,.08);border-radius:8px;overflow:hidden;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;text-align:left;border-bottom:1px solid rgba(245,210,0,.08);background:rgba(245,210,0,.03)}
td{padding:11px 14px;font-size:14px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(245,210,0,.02)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-bg.show{display:flex}
.modal-card{background:#221000;border:1px solid rgba(245,210,0,.2);border-radius:12px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--yolk);margin-bottom:18px}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--brown);border:1px solid rgba(245,210,0,.3);border-radius:8px;padding:12px 24px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;z-index:999;transition:transform .3s,opacity .3s;opacity:0;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.success{border-color:rgba(46,204,113,.4);color:var(--green)}
.toast.error{border-color:rgba(231,76,60,.4);color:#e74c3c}
.toast.warning{border-color:rgba(255,107,53,.4);color:var(--crisp)}
.toast.info{border-color:rgba(52,152,219,.3);color:var(--blue)}

/* SHIFT CARD */
.shift-card{background:linear-gradient(135deg,#2a0f00,#3d1c02);border:2px solid rgba(245,210,0,.2);border-radius:12px;padding:28px;text-align:center;margin-bottom:16px}
.shift-card.working{border-color:rgba(46,204,113,.4);background:linear-gradient(135deg,#0a1f0a,#102010)}
.shift-status{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.timer-display{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:4px;color:var(--yolk);line-height:1;margin-bottom:6px}
.shift-card.working .timer-display{color:var(--green)}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.act-btn{padding:14px;border-radius:8px;border:2px solid;background:transparent;color:inherit;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.act-btn:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.act-btn:disabled{opacity:.3;cursor:not-allowed}

/* PROGRESS BAR */
.prog-wrap{background:rgba(255,255,255,.06);border-radius:20px;overflow:hidden;height:7px}
.prog-bar{height:7px;border-radius:20px;background:linear-gradient(90deg,var(--yolk),var(--crisp));transition:width .5s ease}

/* TABLES MAP */
.table-map{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:14px}
.t-card{background:rgba(255,255,255,.03);border:1px solid rgba(245,210,0,.1);border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:all .2s}
.t-card:hover{border-color:rgba(245,210,0,.3);transform:translateY(-2px)}
.t-card.has-order{border-color:rgba(255,107,53,.5);background:rgba(255,107,53,.05)}
.t-card.occupied{border-color:rgba(46,204,113,.3);background:rgba(46,204,113,.04)}
.t-num{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--yolk);line-height:1}
.t-status{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:.5px;margin-top:2px}

/* ORDER QUEUE */
.order-queue{display:flex;flex-direction:column;gap:8px}
.order-item{background:rgba(255,255,255,.03);border:1px solid rgba(245,210,0,.1);border-radius:8px;padding:12px 14px;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
.order-item.status-new{border-left:3px solid var(--blue)}
.order-item.status-preparing{border-left:3px solid var(--yolk)}
.order-item.status-ready{border-left:3px solid var(--green)}
.order-item.status-pickedup{border-left:3px solid var(--crisp)}
.order-item.status-delivered,.order-item.status-served{opacity:.5;border-left:3px solid var(--muted)}
.order-type-del{background:rgba(52,152,219,.1);color:var(--blue);border:1px solid rgba(52,152,219,.2);font-size:8px;padding:2px 6px;border-radius:3px;font-family:'DM Mono',monospace;letter-spacing:.5px}
.order-type-tbl{background:rgba(245,210,0,.08);color:var(--yolk);border:1px solid rgba(245,210,0,.15);font-size:8px;padding:2px 6px;border-radius:3px;font-family:'DM Mono',monospace;letter-spacing:.5px}

/* INVENTORY */
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.inv-card{background:rgba(255,255,255,.03);border:1px solid rgba(245,210,0,.1);border-radius:8px;padding:14px}
.inv-card.low{border-color:rgba(231,76,60,.35);background:rgba(231,76,60,.03)}
.inv-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:var(--cream);margin-bottom:2px}
.inv-qty{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;line-height:1}
.inv-adj{display:flex;gap:5px;margin-top:8px}
.inv-adj input{width:60px;padding:5px 8px;font-size:12px}

/* LOYALTY CARDS */
.loy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.loy-card{background:rgba(255,255,255,.03);border:1px solid rgba(245,210,0,.1);border-radius:8px;padding:14px}
.stamp-row{display:flex;gap:4px;flex-wrap:wrap;margin:8px 0}
.stamp{width:26px;height:26px;border-radius:50%;border:2px solid rgba(245,210,0,.2);display:flex;align-items:center;justify-content:center;font-size:12px}
.stamp.filled{background:var(--yolk);border-color:var(--yolk)}
.stamp.free{background:var(--crisp);border-color:var(--crisp);animation:pulse 1.5s infinite}

/* ANALYTICS BARS */
.bar-chart{display:flex;flex-direction:column;gap:7px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;text-align:right}
.bar-fill-wrap{flex:1;background:rgba(255,255,255,.05);border-radius:10px;height:16px;overflow:hidden}
.bar-fill{height:16px;border-radius:10px;background:linear-gradient(90deg,var(--yolk),var(--crisp));transition:width .6s}
.bar-val{font-family:'DM Mono',monospace;font-size:10px;color:var(--cream);flex-shrink:0}
.kpi-box{background:rgba(255,255,255,.03);border:1px solid rgba(245,210,0,.1);border-radius:8px;padding:14px;text-align:center}
.kpi-box .kv{font-family:'Bebas Neue',sans-serif;font-size:26px}
.kpi-box .kl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}

/* DELIVERY STATUS BAR */
.del-steps{display:flex;gap:3px;margin:8px 0}
.del-step{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.08)}
.del-step.done{background:var(--green)}
.del-step.active{background:var(--yolk);animation:pulse 1.5s infinite}

/* SCHEDULER */
.sched-wrap{overflow-x:auto}
.sched-grid{display:grid;grid-template-columns:100px repeat(7,1fr);gap:1px;background:rgba(245,210,0,.08);border-radius:6px;overflow:hidden;min-width:600px;font-size:11px}
.sched-cell{background:var(--dark);padding:7px 5px;text-align:center}
.sched-cell.hdr{background:rgba(245,210,0,.05);font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.sched-cell.wname{background:rgba(61,28,2,.6);font-family:'Fredoka',sans-serif;font-size:12px;color:var(--cream);text-align:left;padding-left:8px}
.shift-chip{background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.25);border-radius:3px;padding:2px 4px;font-family:'DM Mono',monospace;font-size:8px;color:var(--green);cursor:pointer;transition:all .2s;display:inline-block}
.shift-chip:hover{background:rgba(46,204,113,.22)}
.shift-chip.off{background:transparent;border-color:transparent;color:var(--muted);font-size:7px}
.shift-chip.leave{background:rgba(231,76,60,.1);border-color:rgba(231,76,60,.2);color:#e74c3c}

/* ALERTS */
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:6px;border:1px solid;margin-bottom:7px}
.alert-item.critical{background:rgba(231,76,60,.06);border-color:rgba(231,76,60,.25)}
.alert-item.warning{background:rgba(255,107,53,.06);border-color:rgba(255,107,53,.25)}
.alert-item.info{background:rgba(52,152,219,.06);border-color:rgba(52,152,219,.2)}
.alert-item.success{background:rgba(46,204,113,.06);border-color:rgba(46,204,113,.2)}
.al-title{font-family:'Fredoka',sans-serif;font-size:13px;font-weight:600;color:var(--cream)}
.al-body{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px}
.al-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-left:auto;flex-shrink:0}

/* BILLING */
.pay-pill{padding:7px 14px;border-radius:20px;border:1px solid rgba(245,210,0,.2);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;transition:all .2s}
.pay-pill.active{background:rgba(245,210,0,.1);border-color:var(--yolk);color:var(--yolk)}

/* FEEDBACK */
.fb-star{font-size:22px;cursor:pointer;transition:transform .15s}
.fb-star:hover{transform:scale(1.2)}

/* EMPTY STATE */
.empty{text-align:center;padding:32px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}

/* WASTE LOG */
.waste-row{background:rgba(231,76,60,.04);border:1px solid rgba(231,76,60,.12);border-radius:4px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;font-family:'DM Mono',monospace;font-size:10px;margin-bottom:5px}

/* INFO BAR */
.info-bar{background:rgba(52,152,219,.06);border:1px solid rgba(52,152,219,.2);border-radius:6px;padding:9px 14px;margin-bottom:14px;font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);display:flex;align-items:center;gap:8px}

/* GPS BAR */
.gps-bar{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px}
.gps-ok{background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.2);color:var(--green)}
.gps-fail{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.2);color:#e74c3c}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}

/* BRANCH CARD */
.branch-card{background:rgba(255,255,255,.03);border:1px solid rgba(245,210,0,.1);border-radius:8px;padding:14px;margin-bottom:10px}

/* GPS CHECKING */
.gps-check-box{background:rgba(52,152,219,.06);border:1px solid rgba(52,152,219,.2);border-radius:8px;padding:16px;text-align:center;margin-bottom:16px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* RTL Support */
html[dir="rtl"] .nav-tabs{direction:rtl}
html[dir="rtl"] .top-right{flex-direction:row-reverse}
html[dir="rtl"] .order-item.status-new{border-left:none;border-right:3px solid var(--blue)}
html[dir="rtl"] .order-item.status-preparing{border-left:none;border-right:3px solid var(--yolk)}
html[dir="rtl"] .order-item.status-ready{border-left:none;border-right:3px solid var(--green)}
html[dir="rtl"] .order-item.status-pickedup{border-left:none;border-right:3px solid var(--crisp)}
html[dir="rtl"] .order-item.status-delivered,.order-item.status-served{border-left:none;border-right:3px solid var(--muted)}
html[dir="rtl"] body{font-family:'Fredoka',sans-serif}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- Edit Worker Modal -->
<div class="modal-bg" id="editModal">
  <div class="modal-card">
    <div class="modal-title" id="em-title">✏️ Edit Worker</div>
    <div class="fg">
      <div><label class="lbl-mono" id="lbl-name">Name</label><input id="em-name" disabled/></div>
      <div><label class="lbl-mono" id="lbl-phone">Phone</label><input id="em-phone" disabled/></div>
      <div><label class="lbl-mono" id="lbl-role">Role</label>
        <select id="em-role">
          <option value="cashier">Cashier</option>
          <option value="cook">Cook</option>
          <option value="delivery">Delivery</option>
        </select>
      </div>
      <div style="background:rgba(245,210,0,.04);border:1px solid rgba(245,210,0,.15);border-radius:4px;padding:12px">

function haversine(lat1,lng1,lat2,lng2){
  const R=6371000;const dLat=(lat2-lat1)*Math.PI/180;const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function checkGPS(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){reject('no_geo');return;}
    navigator.geolocation.getCurrentPosition(pos=>{
      resolve({lat:pos.coords.latitude,lng:pos.coords.longitude});
    },err=>{reject('denied');},{timeout:8000,maximumAge:30000});
  });
}
function nearestBranch(lat,lng){
  let best=null,bestDist=Infinity;
  BRANCHES.forEach(b=>{const d=haversine(lat,lng,b.lat,b.lng);if(d<bestDist){bestDist=d;best=b;}});
  return {branch:best,dist:bestDist};
}
function extractCoordsFromGoogleLink(url){
  const patterns=[/@(-?\d+\.\d+),(-?\d+\.\d+)/,/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/,/ll=(-?\d+\.\d+),(-?\d+\.\d+)/];
  for(const p of patterns){const m=url.match(p);if(m)return{lat:parseFloat(m[1]),lng:parseFloat(m[2])};}
  return null;
}

window.doWorkerLogin=async()=>{
  const ph=($('wph')?.value||'').trim();
  const w=WORKERS.find(x=>x.phone===ph||normPhone(x.phone)===normPhone(ph));
  if(!w){const e=$('wph-err');if(e){e.textContent=t('phone_not_found');e.style.display='block';}return;}

  // GPS check
  if(BRANCHES.length>0){
    const errEl=$('wph-err');
    if(errEl){errEl.textContent=t('gps_checking');errEl.style.display='block';errEl.style.color='var(--blue)';}
    try{
      const pos=await checkGPS();
      S.gpsLat=pos.lat;S.gpsLng=pos.lng;
      const {branch,dist}=nearestBranch(pos.lat,pos.lng);
      if(dist>300){
        if(errEl){errEl.textContent=t('gps_too_far')+` (${Math.round(dist)}m)`;errEl.style.display='block';errEl.style.color='#e74c3c';}
        return;
      }
      S.gpsStatus='ok';
      S.gpsNearBranch=branch?branch.name:'Unknown';
    }catch(err){
      // If GPS is denied, let manager decide — show warning but allow if no branches require it
      if(errEl){errEl.textContent=t('gps_no_permission')+' — signing in without location check.';errEl.style.display='block';errEl.style.color='var(--crisp)';}
      S.gpsStatus='skipped';
    }
  }

  S.user=w;S.screen='worker';S.wTab='shift';render();
};
window.doManagerLogin=()=>{
  const pin=($('mpin')?.value||'').trim();
  if(pin!==MANAGER.pin){const e=$('mpin-err');if(e){e.textContent=t('wrong_pin');e.style.display='block';}return;}
  S.user=MANAGER;S.screen='manager';render();
};
window.doLogout=()=>{
  clearInterval(S.timerInt);clearInterval(S.clockInt);
  S.user=null;S.shift=null;S.screen='auth';S.wTab='shift';S.gpsStatus='pending';render();
};

// ── ORDER CARD (new unified) ─────────────────────────────────
function buildOrderCard(o,viewRole,delivWorkers){
  const isCashier=viewRole==='cashier'||viewRole==='cook';
  const isDelivery=viewRole==='delivery';
  const isManager=viewRole==='manager';
  const loy=o.phone?findLoyalty(o.phone):null;

  // Delivery status flow:
  // new -> preparing -> ready -> pickedup -> delivered
  // Anyone can advance until pickedup; only the assigned delivery worker can mark delivered
  const delSteps={new:'preparing',preparing:'ready',ready:'pickedup'};
  const tabSteps={new:'preparing',preparing:'ready',ready:'served'};
  const nextStatus=o.type==='delivery'?delSteps:tabSteps;
  const nextLabel={new:'→ Start Prep',preparing:'→ Mark Ready',ready:o.type==='delivery'?'→ Picked Up':'→ Mark Served',pickedup:'→ DELIVERED'};

  // Who can do what:
  // - cashier: can assign delivery, advance table orders new->preparing->ready->served
  // - cook: can advance new->preparing->ready
  // - delivery worker (assigned): can mark pickedup->delivered
  // - manager: VIEW ONLY — no action buttons
  const canAdvance=(status)=>{
    if(isManager)return false; // manager view-only
    if(o.type==='delivery'){
      if(status==='pickedup')return isDelivery&&o.assignedTo===S.user?.id;
      return (isCashier||isDelivery)&&status!=='delivered';
    }
    return isCashier&&status!=='served';
  };

  const delivWorkersList=delivWorkers||WORKERS.filter(w=>w.role==='delivery');
  // Only cashier can assign delivery — not manager
  const canAssign=isCashier&&o.type==='delivery'&&!o.assignedTo&&o.status==='new';
  
  return `
  <div class="order-item status-${o.status}">
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap">
        ${o.type==='delivery'?`<span class="order-type-del">🛵 DELIVERY</span><span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--blue)">${esc(o.name||'')} · ${esc(o.addr||'')}</span>`:
        `<span class="order-type-tbl">🪑 TABLE ${o.table}</span>`}
        ${orderStatusBadge(o.status)}
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-left:auto">${fmtAgo(o.created)}</span>
      </div>
      ${o.phone?`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:4px">📱 ${esc(o.phone)} ${loy?`· <span style="color:var(--green)">${loy.name} (${loy.stamps}/10 stamps)</span>`:''}</div>`:''}
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">
        ${o.items.map(i=>`<span style="background:rgba(255,255,255,.04);border:1px solid rgba(245,210,0,.1);border-radius:4px;padding:2px 8px;font-size:12px">${i.qty}× ${esc(i.name)} <span style="color:var(--yolk)">€${i.qty*i.price}</span></span>`).join('')}
      </div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--yolk)">€${o.total}</div>
      ${o.assignedName?`<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--green);margin-top:4px">🛵 Assigned: ${esc(o.assignedName)}</div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
      ${isManager?`<span class="badge bb" style="font-size:9px;padding:4px 8px">👁 View Only</span>`:''}
      ${canAssign&&delivWorkersList.length?`<select id="assign_${o.id}" style="font-size:11px;padding:4px 8px;width:130px">
        <option value="">— ${t('assign_delivery')} —</option>
        ${delivWorkersList.map(w=>`<option value="${w.id}_${w.name}">${esc(w.name)}</option>`).join('')}
      </select>
      <button class="btn btn-blue btn-sm" style="font-size:10px;padding:4px 10px;background:rgba(52,152,219,.15);color:var(--blue);border:1px solid rgba(52,152,219,.3)" onclick="assignDelivery('${o.id}')">Assign →</button>`:''}
      ${canAdvance(o.status)&&nextStatus[o.status]?`<button class="btn btn-yolk" style="padding:7px 14px;font-size:13px;white-space:nowrap" onclick="advanceOrder('${o.id}')">${nextLabel[o.status]}</button>`:''}
      ${o.status==='pickedup'&&(isDelivery&&o.assignedTo===S.user?.id)?`<button class="btn btn-green" style="padding:7px 14px;font-size:13px" onclick="markDelivered('${o.id}')">✅ ${t('mark_delivered')}</button>`:''}
      ${isCashier&&o.status!=='delivered'&&o.status!=='served'&&o.status!=='cancelled'?`<button class="btn btn-red" style="padding:4px 10px;font-size:10px;font-family:'DM Mono',monospace" onclick="cancelOrder('${o.id}')">✕ Cancel</button>`:''}
    </div>
  </div>`;
}

window.assignDelivery=id=>{
  const o=ORDERS.find(x=>x.id===id);if(!o)return;
  const sel=$('assign_'+id);if(!sel||!sel.value)return;
  const [wid,wname]=sel.value.split('_');
  o.assignedTo=wid;o.assignedName=wname;
  toast(`Order assigned to ${wname}!`,'success');dbSave();renderWorker();
};
window.advanceOrder=id=>{
  const o=ORDERS.find(x=>x.id===id);if(!o)return;
  const del={new:'preparing',preparing:'ready',ready:o.type==='delivery'?'pickedup':'served'};
  const prev=o.status;o.status=del[prev]||o.status;
  if((o.status==='served')&&o.phone){stampLoyalty(o);}
  else{toast(`Order → ${o.status}`,'success');}
  dbSave();
  if(S.screen==='worker')renderWorker();else renderManager();
};
window.markDelivered=id=>{
  const o=ORDERS.find(x=>x.id===id);if(!o)return;
  if(o.status!=='pickedup'){toast('Order must be picked up first!','warning');return;}
  o.status='delivered';
  if(o.phone)stampLoyalty(o);
  else toast('Order delivered! ✅','success');
  dbSave();
  if(S.screen==='worker')renderWorker();else renderManager();
};
function stampLoyalty(o){
  let loy=findLoyalty(o.phone);
  if(!loy){loy={phone:o.phone,name:o.name||'Customer',stamps:0,orders:0,joined:new Date().toISOString().split('T')[0]};LOYALTY.push(loy);}
  loy.orders++;
  // Auto loyalty: every 10 orders earns a free item. stamps = orders % 10 (cycles)
  const prevCycle=Math.floor((loy.orders-1)/10);
  const newCycle=Math.floor(loy.orders/10);
  loy.stamps=loy.orders%10; // 0-9 progress in current cycle
  if(newCycle>prevCycle){
    toast(`🎁 ${loy.name} earned a FREE ITEM! (${loy.orders} orders total)`,'success');
  } else {
    toast(`Loyalty: ${loy.name} — ${loy.orders} orders (${loy.stamps}/10 to free item)`,'success');
  }
}
window.cancelOrder=id=>{
  const o=ORDERS.find(x=>x.id===id);if(!o)return;
  o.status='cancelled';toast('Order cancelled','warning');dbSave();
  if(S.screen==='worker')renderWorker();else renderManager();
};

  const msel=$('nom-item');if(msel&&!msel.innerHTML){msel.innerHTML=menuOpts;}

  const sel=$('nom-table');if(sel)sel.innerHTML=TABLES.map(t=>`<option value="${t}">Table ${t}</option>`).join('');
  const msel=$('nom-item');if(msel)msel.innerHTML=MENU.map(m=>`<option value="${m.price}" data-id="${m.id}" data-name="${m.name}">${m.icon} ${m.name} — €${m.price}</option>`).join('');

window.closeNewOrder=()=>$('newOrderModal').classList.remove('show');
window.nomPhoneLookup=()=>{const ph=($('nom-phone')?.value||'');const loy=findLoyalty(ph);const info=$('nom-loyalty-info');if(info)info.innerHTML=loy?`🎁 ${esc(loy.name)} — ${loy.stamps}/10 stamps`:''};
window.nomAddItem=()=>{
  const sel=$('nom-item');if(!sel)return;
  const opt=sel.options[sel.selectedIndex];const name=opt.dataset.name;const price=parseFloat(sel.value);const id=opt.dataset.id;
  const ex=_nomItems.find(i=>i.id===id);if(ex)ex.qty++;else _nomItems.push({id,name,price,qty:1});nomRender();
};
function nomRender(){
  const list=$('nom-items-list'),tot=$('nom-total');
  if(list)list.innerHTML=_nomItems.length?_nomItems.map(i=>`<div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px"><span>${i.qty}× ${esc(i.name)}</span><span style="color:var(--yolk)">€${i.qty*i.price}</span></div>`).join(''):`<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)">No items added</span>`;
  const total=_nomItems.reduce((a,i)=>a+i.qty*i.price,0);
  if(tot)tot.textContent=total?`Total: €${total}`:'';
}
window.nomSubmit=()=>{
  if(!_nomItems.length){toast('Add at least one item','error');return;}
  const table=parseInt($('nom-table')?.value)||1;
  const phone=($('nom-phone')?.value||'').trim();
  const total=_nomItems.reduce((a,i)=>a+i.qty*i.price,0);
  const ord={id:'ord'+Date.now(),type:'table',table,status:'new',items:_nomItems.map(i=>({...i})),total,phone:phone||null,name:null,addr:null,created:Date.now(),branch:'Main',assignedTo:null,assignedName:null};
  ORDERS.push(ord);if(phone){let loy=findLoyalty(phone);if(!loy){loy={phone,name:'Customer',stamps:0,orders:0,joined:new Date().toISOString().split('T')[0]};LOYALTY.push(loy);}}
  dbSave();closeNewOrder();toast(`Table ${table} order placed!`,'success');renderWorker();
};

        <div style="margin:6px 0">${progBar(Math.min(100,Math.round(i.qty/Math.max(i.min*2,1)*100)),i.qty<=i.min?'linear-gradient(90deg,#e74c3c,#c0392b)':undefined)}</div>

    WASTE_LOG.slice(0,8).map(w=>`<div class="waste-row">
      <span style="color:var(--cream)">${w.item}</span>
      <span style="color:#e74c3c">-${w.qty} ${w.unit}</span>
      <span>${w.reason}</span>

window.wInvAdd=id=>{
  const i=INVENTORY.find(x=>x.id===id);if(!i)return;
  const v=parseInt($('winv_'+id)?.value)||0;
  if(v<=0){toast('Enter quantity > 0','error');return;}
  i.qty+=v;toast(`+${v} ${i.unit} added to ${i.name}`,'success');dbSave();renderWorker();
};
window.wInvWaste=id=>{
  const i=INVENTORY.find(x=>x.id===id);if(!i)return;
  const v=parseInt($('winv_'+id)?.value)||0;
  if(v<=0){toast('Enter quantity > 0','error');return;}
  if(v>i.qty){toast('Cannot exceed current stock','error');return;}
  i.qty-=v;WASTE_LOG.unshift({item:i.name,qty:v,unit:i.unit,reason:'Manual log',time:Date.now(),by:S.user.name});
  toast(`Logged ${v} ${i.unit} waste for ${i.name}`,'warning');dbSave();renderWorker();
};

  const todayRev=ORDERS.filter(o=>o.status==='delivered'||o.status==='served').reduce((a,o)=>a+o.total,0);
  const lowStock=INVENTORY.filter(i=>i.qty<=i.min);
  const unrespondedFeedback=FEEDBACK.filter(f=>f.rating<=2&&!f.responded);
  return `
  <div class="stat-grid">
    ${[['👥 Staff On Shift',onShift.length,'var(--green)'],['📋 Active Orders',activeOrds.length,'var(--yolk)'],['🛵 Deliveries Today',delOrds.length,'var(--blue)'],['💶 Revenue Today','€'+todayRev,'var(--yolk)'],['⚠️ Low Stock',lowStock.length,lowStock.length?'#e74c3c':'var(--green)'],['⭐ Urgent Feedback',unrespondedFeedback.length,unrespondedFeedback.length?'#e74c3c':'var(--green)']].map(([l,v,c])=>`<div class="stat-card"><div class="sc-label">${l}</div><div class="sc-value" style="color:${c}">${v}</div></div>`).join('')}

    <div class="panel">
      <div class="panel-title">👷 STAFF ON SHIFT</div>

    </div>
    <div class="panel">
      <div class="panel-title">🍽️ LIVE KITCHEN QUEUE</div>
      ${activeOrds.length===0?`<div class="empty"><div class="empty-icon">✅</div>Kitchen is clear.</div>`:
      activeOrds.slice(0,6).map(o=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(245,210,0,.06)"><div>${o.type==='delivery'?`<span class="order-type-del">🛵</span>`:`<span class="order-type-tbl">T${o.table}</span>`}<span style="font-size:12px;color:var(--cream);margin-left:6px">${o.items.map(i=>i.qty+'×'+i.name).join(', ').slice(0,40)}</span></div><div style="display:flex;align-items:center;gap:8px"><span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)">${fmtAgo(o.created)}</span>${orderStatusBadge(o.status)}</div></div>`).join('')}
    </div>
  </div>

// ── MGR: ORDERS ──────────────────────────────────────────────

// ── MGR: DELIVERY ────────────────────────────────────────────
function buildMgrDelivery(){
  const dels=ORDERS.filter(o=>o.type==='delivery');
  const waiting=dels.filter(o=>!o.assignedTo&&o.status!=='delivered'&&o.status!=='cancelled');
  const active=dels.filter(o=>o.assignedTo&&o.status!=='delivered'&&o.status!=='cancelled');
  const done=dels.filter(o=>o.status==='delivered');
  const delivWorkers=WORKERS.filter(w=>w.role==='delivery');
  return `
  <div class="stat-grid" style="margin-bottom:14px">
    ${[['⏳ Waiting Rider',waiting.length,'var(--crisp)'],['🛵 In Transit',active.length,'var(--yolk)'],['✅ Delivered',done.length,'var(--green)'],['💶 Revenue','€'+dels.reduce((a,o)=>a+o.total,0),'var(--blue)']].map(([l,v,c])=>`<div class="stat-card"><div class="sc-label">${l}</div><div class="sc-value" style="color:${c}">${v}</div></div>`).join('')}
  </div>
  <div class="panel">
    <div class="panel-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>🛵 ALL DELIVERY ORDERS</span>
      <button class="btn btn-yolk btn-sm" style="padding:7px 14px" onclick="mgrAddDelivery()">+ New Delivery</button>
    </div>
    ${dels.length===0?`<div class="empty"><div class="empty-icon">🛵</div>No delivery orders yet.</div>`:
    dels.map(o=>buildOrderCard(o,'manager',delivWorkers)).join('')}
  </div>`;
}

// ── MGR: INVENTORY ───────────────────────────────────────────
function buildMgrInventory(){
  const low=INVENTORY.filter(i=>i.qty<=i.min);
  const wasteCost=WASTE_LOG.reduce((a,w)=>{const i=INVENTORY.find(x=>x.name===w.item);return a+(i?w.qty*(i.unit==='kg'?8:i.unit==='L'?5:.5):0);},0);
  return `
  ${low.length?`<div style="background:rgba(231,76,60,.07);border:1px solid rgba(231,76,60,.25);border-radius:6px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px"><span>⚠️</span><div><div style="font-size:13px;color:#e74c3c;font-weight:600">${low.length} items low — Reorder needed</div><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)">${low.map(i=>i.name).join(', ')}</div></div></div>`:''}
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--yolk)">📦 INVENTORY</div>
    <button class="btn btn-yolk btn-sm" style="padding:8px 14px" onclick="openAddInv()">+ Add Item</button>
  </div>
  <div class="inv-grid" style="margin-bottom:14px">
    ${INVENTORY.map(i=>`
      <div class="inv-card ${i.qty<=i.min?'low':''}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:22px">${i.icon}</span>
          <div style="display:flex;gap:4px">
            ${i.qty<=i.min?`<span class="badge br" style="font-size:8px">LOW</span>`:`<span class="badge bg" style="font-size:8px">OK</span>`}
            <button class="btn btn-dark btn-sm" style="font-size:9px;padding:2px 6px" onclick="editInvItem('${i.id}')">✏️</button>
          </div>
        </div>
        <div class="inv-name">${esc(i.name)}</div>
        <div class="inv-qty" style="color:${i.qty<=i.min?'#e74c3c':'var(--green)'}">${i.qty}<span style="font-size:12px;color:var(--muted);margin-left:3px">${i.unit}</span></div>
        <div style="margin:6px 0">${progBar(Math.min(100,Math.round(i.qty/Math.max(i.min*2,1)*100)),i.qty<=i.min?'linear-gradient(90deg,#e74c3c,#c0392b)':undefined)}</div>
        <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:7px">Min: ${i.min} ${i.unit}</div>
        <div class="inv-adj">
          <input type="number" id="inv_${i.id}" value="0" min="0" style="width:55px;padding:5px 7px;font-size:12px"/>
          <button class="btn btn-green btn-sm" style="padding:5px 9px" onclick="invAdd('${i.id}')">+ Add</button>
          <button class="btn btn-red btn-sm" style="padding:5px 9px" onclick="invLog('${i.id}')">🗑</button>
        </div>
      </div>`).join('')}
  </div>
  <div class="panel">
    <div class="panel-title">🗑 WASTE LOG — Est. Cost Today: <span style="color:#e74c3c">€${wasteCost.toFixed(2)}</span></div>
    ${WASTE_LOG.length===0?`<div class="empty"><div class="empty-icon">✅</div>No waste today.</div>`:
    WASTE_LOG.slice(0,10).map(w=>`<div class="waste-row"><span style="color:var(--cream)">${w.item}</span><span style="color:#e74c3c">-${w.qty} ${w.unit}</span><span>${w.reason}</span><span style="color:var(--muted)">${w.by||'Worker'}</span><span style="color:var(--muted)">${fmtAgo(w.time)}</span></div>`).join('')}
  </div>`;
}
window.invAdd=id=>{const i=INVENTORY.find(x=>x.id===id);if(!i)return;const v=parseInt($('inv_'+id)?.value)||0;if(v<=0){toast('Enter qty > 0','error');return;}i.qty+=v;toast(`+${v} ${i.unit} ${i.name}`,'success');dbSave();mTab('inventory');};
window.invLog=id=>{const i=INVENTORY.find(x=>x.id===id);if(!i)return;const v=parseInt($('inv_'+id)?.value)||0;if(v<=0){toast('Enter qty > 0','error');return;}if(v>i.qty){toast('Exceeds current stock','error');return;}i.qty-=v;WASTE_LOG.unshift({item:i.name,qty:v,unit:i.unit,reason:'Manager log',time:Date.now(),by:'Manager'});toast(`Logged ${v} ${i.unit} waste`,'warning');dbSave();mTab('inventory');};

window.openAddInv=()=>{
  S.editInvId=null;
  $('ai-title').textContent='📦 Add Inventory Item';
  $('ai-name').value='';$('ai-qty').value=0;$('ai-min').value=10;$('ai-icon').value='📦';

  $('ai-name').value=i.name;$('ai-qty').value=i.qty;$('ai-min').value=i.min;$('ai-icon').value=i.icon;$('ai-unit').value=i.unit;
  $('addInvModal').classList.add('show');
};
window.saveInvItem=()=>{
  const name=($('ai-name')?.value||'').trim();
  const qty=parseInt($('ai-qty')?.value)||0;
  const min=parseInt($('ai-min')?.value)||0;
  const unit=$('ai-unit')?.value||'pcs';
  const icon=$('ai-icon')?.value||'📦';
  if(!name){toast('Enter item name','error');return;}
  if(S.editInvId){
    const i=INVENTORY.find(x=>x.id===S.editInvId);if(!i)return;
    Object.assign(i,{name,qty,min,unit,icon});toast('Item updated!','success');
  }else{
    INVENTORY.push({id:'iv'+Date.now(),name,qty,min,unit,icon});toast('Item added!','success');
  }
  dbSave();$('addInvModal').classList.remove('show');mTab('inventory');
};

};
window.openEditWorker=id=>{
  const w=WORKERS.find(x=>x.id===id);if(!w)return;

  const w=WORKERS.find(x=>x.id===S.editWorkerId);if(!w)return;
  w.role=$('em-role')?.value||w.role;
  w.hourly_rate=parseFloat($('em-rate')?.value)||w.hourly_rate;
  w.inv_perm=$('em-inv-perm')?.value==='1';
  toast('Worker updated!','success');dbSave();closeModal();mTab('staff');
};
window.closeModal=()=>$('editModal').classList.remove('show');
window.removeWorker=id=>{
  if(!confirm('Remove this worker?'))return;
  const idx=WORKERS.findIndex(x=>x.id===id);if(idx>=0)WORKERS.splice(idx,1);
  toast('Worker removed','warning');dbSave();mTab('staff');
};
window.submitAddWorker=()=>{
  const name=($('aw-name')?.value||'').trim();
  const phone=($('aw-phone')?.value||'').trim();
  const role=$('aw-role')?.value||'cashier';
  const rate=parseFloat($('aw-rate')?.value)||12;
  if(!name||!phone){toast('Name and phone required','error');return;}
  if(WORKERS.find(w=>normPhone(w.phone)===normPhone(phone))){toast('Phone already registered','warning');return;}
  WORKERS.push({id:'w'+Date.now(),name,phone,role,hourly_rate:rate,inv_perm:false});
  toast('Worker added!','success');dbSave();$('addWorkerModal').classList.remove('show');mTab('staff');
};

      </div>`;}).join('')}
  </div>`;
}
window.loyStamp=phone=>{const c=findLoyalty(phone);if(!c)return;if(c.stamps>=10){toast('Redeem free item first!','warning');return;}c.stamps++;c.orders++;toast(`Stamp added (${c.stamps}/10)`,'success');dbSave();mTab('loyalty');};
window.loyRedeem=phone=>{const c=findLoyalty(phone);if(!c)return;c.stamps=0;toast(`🎁 Free item redeemed for ${c.name}!`,'success');dbSave();mTab('loyalty');};
window.loyAddMember=()=>{
  const ph=($('loy-addphone')?.value||'').trim();const nm=($('loy-addname')?.value||'').trim()||'Customer';
  if(!ph){toast('Enter phone number','error');return;}if(findLoyalty(ph)){toast('Already exists!','warning');return;}
  LOYALTY.push({phone:ph,name:nm,stamps:0,orders:0,joined:new Date().toISOString().split('T')[0]});
  toast('Member added!','success');dbSave();mTab('loyalty');
};

// ── MGR: ANALYTICS ───────────────────────────────────────────
function buildMgrAnalytics(){
  const completedOrders=ORDERS.filter(o=>o.status==='delivered'||o.status==='served');
  const rev=completedOrders.reduce((a,o)=>a+o.total,0);
  const avgOrder=completedOrders.length?Math.round(rev/completedOrders.length):0;
  const weeklyData=[{d:'Mon',r:8240},{d:'Tue',r:7100},{d:'Wed',r:9300},{d:'Thu',r:11200},{d:'Fri',r:14800},{d:'Sat',r:16400},{d:'Sun',r:13600}];
  const maxW=Math.max(...weeklyData.map(d=>d.r));
  const topItems=[...MENU].sort((a,b)=>b.sold*b.price-a.sold*a.price).slice(0,6);
  const maxSold=topItems[0]?topItems[0].sold*topItems[0].price:1;
  return `
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px">
    ${[['📦 Orders',completedOrders.length,'var(--blue)'],['💶 Revenue',rev?'€'+rev:'€0','var(--yolk)'],['💰 Avg Order','€'+avgOrder,'var(--green)'],['👥 Members',LOYALTY.length,'var(--purple)'],['🗑 Waste','€'+WASTE_LOG.reduce((a,w)=>{const i=INVENTORY.find(x=>x.name===w.item);return a+(i?w.qty*(i.unit==='kg'?8:i.unit==='L'?5:.5):0);},0).toFixed(0),'#e74c3c'],['⭐ Avg Rating',FEEDBACK.length?(FEEDBACK.reduce((a,f)=>a+f.rating,0)/FEEDBACK.length).toFixed(1):'—','var(--yolk)']].map(([l,v,c])=>`<div class="kpi-box"><div class="kv" style="color:${c}">${v}</div><div class="kl">${l}</div></div>`).join('')}
  </div>
  <div class="sg">
    <div class="panel">
      <div class="panel-title">📅 REVENUE THIS WEEK</div>
      <div class="bar-chart">${weeklyData.map(d=>`<div class="bar-row"><div class="bar-label" style="width:30px">${d.d}</div><div class="bar-fill-wrap"><div class="bar-fill" style="width:${Math.round(d.r/maxW*100)}%"></div></div><div class="bar-val">€${(d.r/1000).toFixed(1)}k</div></div>`).join('')}</div>
    </div>
    <div class="panel">
      <div class="panel-title">🍗 TOP ITEMS BY REVENUE</div>
      <div class="bar-chart">${topItems.map(m=>`<div class="bar-row"><div class="bar-label" style="width:70px;font-size:9px">${m.icon} ${m.name.split(' ')[0]}</div><div class="bar-fill-wrap"><div class="bar-fill" style="width:${Math.round(m.sold*m.price/maxSold*100)}%"></div></div><div class="bar-val">€${(m.sold*m.price/1000).toFixed(1)}k</div></div>`).join('')}</div>
    </div>
  </div>`;
}

// ── MGR: SALARY ───────────────────────────────────────────────
function buildMgrSalary(){
  const week=7*24*3600000;
  const weekShifts=SHIFTS.filter(s=>s.start>=Date.now()-week);
  const totalPay=WORKERS.reduce((acc,w)=>{const hrs=weekShifts.filter(s=>s.worker===w.id&&s.status==='completed').reduce((a,s)=>a+s.hours,0);return acc+hrs*w.hourly_rate;},0);
  return `
  <div class="stat-grid" style="margin-bottom:14px">
    ${[['👷 Workers',WORKERS.length,'var(--cream)'],['💶 Total Payroll (7d)','€'+totalPay.toFixed(0),'var(--yolk)'],['⏰ Avg Hours/Worker',(weekShifts.reduce((a,s)=>a+s.hours,0)/Math.max(1,WORKERS.length)).toFixed(1)+'h','var(--green)']].map(([l,v,c])=>`<div class="stat-card"><div class="sc-label">${l}</div><div class="sc-value" style="color:${c}">${v}</div></div>`).join('')}
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Worker</th><th>Role</th><th>Rate/h</th><th>Hours (7d)</th><th>Total Pay</th></tr></thead>
      <tbody>${WORKERS.map(w=>{const hrs=weekShifts.filter(s=>s.worker===w.id&&s.status==='completed').reduce((a,s)=>a+s.hours,0);return `<tr><td style="font-weight:600">${esc(w.name)}</td><td>${esc(w.role)}</td><td style="color:var(--yolk)">€${w.hourly_rate}/h</td><td>${hrs.toFixed(1)}h</td><td style="color:var(--green);font-weight:600">€${(hrs*w.hourly_rate).toFixed(2)}</td></tr>`;}).join('')}</tbody>
    </table>
  </div>`;
}

// ── MGR: SCHEDULER ────────────────────────────────────────────
function buildMgrScheduler(){
  return `
  <div class="sched-wrap">
    <div class="sched-grid">
      <div class="sched-cell hdr">Worker</div>
      ${DAYS.map(d=>`<div class="sched-cell hdr">${d}</div>`).join('')}
      ${WORKERS.map(w=>`
        <div class="sched-cell wname">${esc(w.name.split(' ')[0])}</div>
        ${(SCHEDULE[w.id]||Array(7).fill('OFF')).map((sh,i)=>`<div class="sched-cell"><span class="shift-chip ${sh==='OFF'?'off':sh.includes('L')?'leave':''}">${sh}</span></div>`).join('')}
      `).join('')}
    </div>
  </div>`;
}

// ── MGR: BILLING ─────────────────────────────────────────────
function buildMgrBilling(){
  const sub=BILLING_STATE.items.reduce((a,i)=>a+i.qty*i.price,0);
  return `
  <div class="sg">
    <div class="panel">
      <div class="panel-title">🧾 NEW BILL</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <select id="bill-item" style="flex:1;font-size:12px">${MENU.map(m=>`<option value="${m.price}" data-name="${m.name}">${m.icon} ${m.name} — €${m.price}</option>`).join('')}</select>
        <button class="btn btn-yolk btn-sm" onclick="billAdd()">+ Add</button>
      </div>
      <div style="min-height:60px;background:rgba(255,255,255,.02);border:1px solid rgba(245,210,0,.08);border-radius:4px;padding:10px;margin-bottom:10px">
        ${BILLING_STATE.items.length?BILLING_STATE.items.map(i=>`<div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px"><span>${i.qty}× ${esc(i.name)}</span><span style="color:var(--yolk)">€${i.qty*i.price}</span></div>`).join(''):`<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)">No items</span>`}
      </div>
      <div style="display:flex;justify-content:space-between;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--yolk);margin-bottom:12px"><span>TOTAL</span><span>€${sub.toFixed(2)}</span></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        ${['cash','card','app'].map(p=>`<button class="pay-pill ${BILLING_STATE.payment===p?'active':''}" onclick="billPay('${p}')">${{cash:'💵 Cash',card:'💳 Card',app:'📱 App'}[p]}</button>`).join('')}
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-red" style="flex:1;padding:10px" onclick="billClear()">Clear</button>
        <button class="btn btn-yolk" style="flex:1;padding:10px" onclick="billCharge()">Charge €${sub.toFixed(2)}</button>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">📋 RECENT RECEIPTS</div>
      ${RECEIPTS.slice(0,8).map(r=>`<div style="padding:8px 0;border-bottom:1px solid rgba(245,210,0,.06)"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)">#${r.id} · ${fmtAgo(r.time)}</span><span class="badge ${r.payment==='cash'?'by':r.payment==='card'?'bb':'bg'}" style="font-size:8px">${r.payment}</span></div><div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--cream)">${r.items.map(i=>i.qty+'× '+i.name).join(', ')}</span><span style="color:var(--yolk);font-family:'Bebas Neue',sans-serif">€${r.total}</span></div></div>`).join('')}
    </div>
  </div>`;
}
window.billAdd=()=>{const sel=$('bill-item');if(!sel)return;const opt=sel.options[sel.selectedIndex];const name=opt.dataset.name;const price=parseFloat(sel.value);const ex=BILLING_STATE.items.find(i=>i.name===name);if(ex)ex.qty++;else BILLING_STATE.items.push({name,price,qty:1});mTab('billing');};
window.billPay=p=>{BILLING_STATE.payment=p;mTab('billing');};
window.billClear=()=>{BILLING_STATE.items=[];mTab('billing');};
window.billCharge=()=>{
  if(!BILLING_STATE.items.length){toast('Add items first','error');return;}
  const total=BILLING_STATE.items.reduce((a,i)=>a+i.qty*i.price,0);
  RECEIPTS.unshift({id:'r'+Date.now(),items:[...BILLING_STATE.items],payment:BILLING_STATE.payment,total,time:Date.now()});
  BILLING_STATE.items=[];toast(`💶 €${total.toFixed(2)} charged (${BILLING_STATE.payment})!`,'success');dbSave();mTab('billing');
};

// ── MGR: FEEDBACK ─────────────────────────────────────────────
function buildMgrFeedback(){
  return `
  <div class="stat-grid" style="margin-bottom:14px">
    ${[['⭐ Total Reviews',FEEDBACK.length,'var(--cream)'],['😊 Positive',FEEDBACK.filter(f=>f.rating>=4).length,'var(--green)'],['😐 Neutral',FEEDBACK.filter(f=>f.rating===3).length,'var(--yolk)'],['😞 Negative',FEEDBACK.filter(f=>f.rating<=2&&!f.responded).length,'#e74c3c']].map(([l,v,c])=>`<div class="stat-card"><div class="sc-label">${l}</div><div class="sc-value" style="color:${c}">${v}</div></div>`).join('')}
  </div>
  <div class="info-bar">ℹ️ Feedback is submitted by customers on the order page. Manager view is read-only.</div>
  <div class="panel">
    <div class="panel-title">📋 ALL CUSTOMER FEEDBACK</div>
    ${FEEDBACK.length===0?`<div class="empty"><div class="empty-icon">⭐</div>No feedback yet. Customers submit feedback after their orders.</div>`:
    FEEDBACK.map(f=>`<div class="alert-item ${f.rating<=2?'critical':f.rating===3?'warning':'success'}" style="margin-bottom:6px">
      <div style="flex-shrink:0">
        ${'⭐'.repeat(f.rating)}${'☆'.repeat(5-f.rating)}
      </div>
      <div style="flex:1">
        <div class="al-title">${f.comment?esc(f.comment.slice(0,80)):f.rating>=4?'Positive review':'Negative review'}</div>
        <div class="al-body">#${f.orderRef||'?'} · ${f.branch||'Main'} · ${f.phone||''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="al-time">${fmtAgo(f.time)}</span>
        ${!f.responded?`<span class="badge br" style="font-size:8px">Unread</span>`:`<span class="badge bg" style="font-size:8px">✓ Seen</span>`}
      </div>
    </div>`).join('')}
  </div>`;
}

// ── MGR: ALERTS ───────────────────────────────────────────────
function buildMgrAlerts(){
  const autoAlerts=[];
  INVENTORY.filter(i=>i.qty<=i.min).forEach(i=>autoAlerts.push({type:'critical',icon:'⚠️',title:`Low Stock: ${i.name}`,body:`Only ${i.qty} ${i.unit} left — minimum is ${i.min}`,time:Date.now()-5*60000}));
  ORDERS.filter(o=>o.type==='delivery'&&!o.assignedTo&&o.status==='new'&&Date.now()-o.created>10*60000).forEach(o=>autoAlerts.push({type:'warning',icon:'🛵',title:`Unassigned Delivery #${o.id}`,body:`${esc(o.name)} at ${esc(o.addr)} — waiting ${fmtAgo(o.created)}`,time:o.created}));
  FEEDBACK.filter(f=>f.rating<=2&&!f.responded).forEach(f=>autoAlerts.push({type:'critical',icon:'⭐',title:`Negative Review (${f.rating}★)`,body:`${f.comment?esc(f.comment.slice(0,60))+'...':'No comment'}`,time:f.time}));
  const todayRev=ORDERS.filter(o=>o.status==='delivered'||o.status==='served').reduce((a,o)=>a+o.total,0);
  if(todayRev<500)autoAlerts.push({type:'warning',icon:'📉',title:'Revenue Below Target',body:`Today: €${todayRev} vs target €3,200`,time:Date.now()-20*60000});
  if(!autoAlerts.length)autoAlerts.push({type:'success',icon:'✅',title:'All Systems Normal',body:'No critical alerts at this time.',time:Date.now()});
  return `
  <div class="stat-grid" style="margin-bottom:14px">
    ${[['🚨 Critical',autoAlerts.filter(a=>a.type==='critical').length,'#e74c3c'],['⚠️ Warnings',autoAlerts.filter(a=>a.type==='warning').length,'var(--crisp)'],['✅ Success',autoAlerts.filter(a=>a.type==='success').length,'var(--green)'],['📊 Total',autoAlerts.length,'var(--cream)']].map(([l,v,c])=>`<div class="stat-card"><div class="sc-label">${l}</div><div class="sc-value" style="color:${c}">${v}</div></div>`).join('')}
  </div>
  <div class="panel">
    <div class="panel-title" style="justify-content:space-between"><span>🔔 ALERT FEED</span><button class="btn btn-dark btn-sm" style="font-size:10px" onclick="mTab('alerts')">↻ Refresh</button></div>
    ${autoAlerts.map(a=>`<div class="alert-item ${a.type}"><span style="font-size:18px;flex-shrink:0">${a.icon}</span><div style="flex:1"><div class="al-title">${a.title}</div><div class="al-body">${a.body}</div></div><div class="al-time">${fmtAgo(a.time)}</div></div>`).join('')}
  </div>`;
}

// ══════════════════════════════════════════════════════════════
// TIMER & CLOCK
// ══════════════════════════════════════════════════════════════
function initClock(){
  clearInterval(S.clockInt);
  function tick(){const el=$('clock');if(el){const now=new Date();el.textContent=now.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});}}
  tick();
  S.clockInt=setInterval(tick,1000);
}
function startTimer(active){clearInterval(S.timerInt);if(!active)return;S.timerInt=setInterval(()=>{const el=$('tbig');if(el)el.textContent=fmtMs(Date.now()-active.start);},1000);}

// ── MAPS LINK AUTO-EXTRACT (live event) ──────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  const mapsInput=$('br-maps');
  if(mapsInput){mapsInput.addEventListener('input',function(){const c=extractCoordsFromGoogleLink(this.value);if(c){const la=$('br-lat');const lo=$('br-lng');if(la)la.value=c.lat;if(lo)lo.value=c.lng;toast('Coordinates extracted!','success');}});}
});

document.getElementById('html-root').setAttribute('dir',LANG==='ar'?'rtl':'ltr');

render();
